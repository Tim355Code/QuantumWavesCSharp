  summary: Computes the energy of the nth harmonic oscillator state.
  example: []
  syntax:
    content: public static float Energy(int n, float omega, float hBar = 1)
    parameters:
    - id: n
      type: System.Int32
      description: Quantum number (must be non-negative).
    - id: omega
      type: System.Single
      description: Angular frequency (must be greater than zero).
    - id: hBar
      type: System.Single
      description: Reduced Planck constant (must be greater than zero).
    return:
      type: System.Single
      description: The energy value.
