  assemblies:
  - QuantumLibrary
  namespace: CMath
  summary: Returns whether two complex numbers are within the specified tolerance.
  example: []
  syntax:
    content: public static bool Approximately(ComplexF a, ComplexF b, float tolerance = 1E-05)
    parameters:
    - id: a
      type: CMath.ComplexF
      description: The first complex number.
    - id: b
      type: CMath.ComplexF
      description: The second complex number.
    - id: tolerance
      type: System.Single
      description: The maximum allowed distance between the two values.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the magnitude of <code class="paramref">a</code> - <code class="paramref">b</code>

        is less than or equal to <code class="paramref">tolerance</code>; otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function Approximately(a As ComplexF, b As ComplexF, tolerance As Single = 1E-05) As Boolean
