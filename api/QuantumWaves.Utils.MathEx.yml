  namespace: QuantumWaves.Utils
  summary: Approximates the definite integral of a function using Simpson's rule.
  example: []
  syntax:
    content: public static float Simpson(Func<float, float> f, FloatRange domain, int intervals)
    parameters:
    - id: f
      type: System.Func{System.Single,System.Single}
      description: The function to integrate.
    - id: domain
      type: FloatRange
      description: The integration range.
    - id: intervals
      type: System.Int32
      description: The number of subintervals (must be positive and even).
    return:
      type: System.Single
      description: The approximate integral value.
    content.vb: Public Shared Function Simpson(f As Func(Of Single, Single), domain As FloatRange, intervals As Integer) As Single
  overload: QuantumWaves.Utils.MathEx.Simpson*
  exceptions:
