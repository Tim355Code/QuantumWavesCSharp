    id: GaussianWavePacket
    path: src/QuantumLibrary/Waves/Solutions/FreeParticle1D.cs
    startLine: 106
  assemblies:
  - QuantumLibrary
  namespace: QuantumWaves.Solutions
  summary: Creates an approximate Gaussian wave packet as a weighted sum of plane waves.
  remarks: >-
    The packet is constructed by discretizing the Fourier integral representation

    of a Gaussian momentum distribution.


    Larger <code class="paramref">termCount</code> and smaller <code class="paramref">deltaK</code>

    improve the approximation quality at the cost of additional computation.


    The resulting packet is approximately normalized when the sampled momentum

    range is sufficiently large.
  example: []
  syntax:
    content: public static WeightedWaveFunction1D GaussianWavePacket(float x0, float sigma, float k0, float mass, float hBar, int termCount = 500, float deltaK = 0.01)
    parameters:
    - id: x0
      type: System.Single
      description: Initial center position of the packet.
    - id: sigma
      type: System.Single
      description: Spatial width parameter of the Gaussian packet. Must be greater than zero.
    - id: k0
      type: System.Single
      description: Central wave number of the packet.
    - id: mass
      type: System.Single
      description: Particle mass. Must be greater than zero.
    - id: hBar
      type: System.Single
      description: Reduced Planck constant. Must be greater than zero.
    - id: termCount
      type: System.Int32
      description: >-
        Number of plane wave terms used in the approximation.

        Must be positive and odd.
    - id: deltaK
      type: System.Single
      description: >-
        Spacing between sampled wave numbers in momentum space.

        Must be greater than zero.
    return:
      type: QuantumWaves.WeightedWaveFunction1D
      description: A weighted superposition of plane waves approximating a Gaussian wave packet.
    content.vb: Public Shared Function GaussianWavePacket(x0 As Single, sigma As Single, k0 As Single, mass As Single, hBar As Single, termCount As Integer = 500, deltaK As Single = 0.01) As WeightedWaveFunction1D
  overload: QuantumWaves.Solutions.FreeParticle1D.GaussianWavePacket*
  exceptions:
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: >-
      Thrown if <code class="paramref">sigma</code>, <code class="paramref">mass</code>,

      <code class="paramref">hBar</code>, <code class="paramref">termCount</code>,

      or <code class="paramref">deltaK</code> is invalid.
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: Thrown if <code class="paramref">termCount</code> is even.
  nameWithType.vb: FreeParticle1D.GaussianWavePacket(Single, Single, Single, Single, Single, Integer, Single)
  fullName.vb: QuantumWaves.Solutions.FreeParticle1D.GaussianWavePacket(Single, Single, Single, Single, Single, Integer, Single)
  name.vb: GaussianWavePacket(Single, Single, Single, Single, Single, Integer, Single)
