  assemblies:
  - QuantumLibrary
  namespace: QuantumWaves.Solutions
  summary: Creates a plane wave solution for a free particle.
  remarks: Plane waves are not square normalizable over an infinite domain.
  example: []
  syntax:
    content: public static SeparableWaveFunction1D PlaneWave(float k, float mass, float hBar)
    parameters:
    - id: k
      type: System.Single
      description: Wave number.
    - id: mass
      type: System.Single
      description: Particle mass (must be greater than zero).
    - id: hBar
      type: System.Single
      description: Reduced Planck constant (must be greater than zero).
    return:
      type: QuantumWaves.SeparableWaveFunction1D
      description: A separable wave function representing the plane wave.
    content.vb: Public Shared Function PlaneWave(k As Single, mass As Single, hBar As Single) As SeparableWaveFunction1D
  overload: QuantumWaves.Solutions.FreeParticle1D.PlaneWave*
  exceptions:
